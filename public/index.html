          <div style={{ fontSize: '11px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase' }}>Principal</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '22px', fontWeight: 700, marginTop: '6px' }}>{loan.principalLabel}</div>
        </div>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '18px' }}>
          <div style={{ fontSize: '11px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase' }}>Interest rate</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '22px', fontWeight: 700, marginTop: '6px' }}>8.99% APR</div>
        </div>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '18px' }}>
          <div style={{ fontSize: '11px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase' }}>Weekly payment</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '22px', fontWeight: 700, marginTop: '6px' }}>{loan.paymentLabel}</div>
        </div>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '18px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px' }}>
            <div style={{ fontSize: '11px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase' }}>Insurance / mo</div>
            <button style={{ background: 'none', border: 'none', color: '#0ea5e9', cursor: 'pointer', fontSize: '12px', fontWeight: 600, padding: 0 }} onClick={() => p.setShowInsuranceForm(!p.showInsuranceForm)}>{p.showInsuranceForm ? 'Close' : 'Update'}</button>
          </div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '22px', fontWeight: 700, marginTop: '6px' }}>{money(insCurrent.monthly)}</div>
          <div style={{ fontSize: '11px', color: '#8a90a0', marginTop: '4px' }}>since {fmtDate(parseDate(insCurrent.start))}</div>
        </div>
      </div>

      {p.showInsuranceForm && (
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '22px', marginBottom: '18px' }}>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px', marginBottom: '4px' }}>Update insurance premium</div>
          <div style={{ fontSize: '12px', color: '#8a90a0', marginBottom: '14px' }}>Enter the new monthly amount from your renewal — months before the effective date keep the old rate.</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(160px,1fr))', gap: '12px', alignItems: 'end' }}>
            <div><FieldLabel>NEW MONTHLY AMOUNT ($)</FieldLabel><input type="number" step="0.01" placeholder="0.00" style={fieldInputStyle} value={insf.monthly} onChange={e => p.setInsuranceForm({ ...insf, monthly: e.target.value })} /></div>
            <div><FieldLabel>EFFECTIVE FROM</FieldLabel><input type="date" style={fieldInputStyle} value={insf.start} onChange={e => p.setInsuranceForm({ ...insf, start: e.target.value })} /></div>
            <button style={{ background: '#14171f', color: '#ffffff', border: 'none', borderRadius: '8px', padding: '11px 18px', fontSize: '13.5px', fontWeight: 600, cursor: 'pointer' }} onClick={p.submitInsuranceRate}>Save new rate</button>
          </div>
          <div style={{ marginTop: '16px', borderTop: '1px solid #eef0f3', paddingTop: '6px' }}>
            <div style={{ fontSize: '11px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase', padding: '8px 0' }}>Rate history</div>
            {insuranceHistory.map((h, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', fontSize: '13px', color: '#3a3f4b' }}>
                <span>{h.rangeLabel}</span>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <span style={{ fontWeight: 600 }}>{h.amountLabel}/mo</span>
                  {h.removable && <button style={{ background: 'none', border: 'none', color: '#8a90a0', cursor: 'pointer', fontSize: '14px', padding: '2px' }} onClick={() => p.removeInsuranceRate(h.start)} title="Delete">✕</button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ background: 'linear-gradient(135deg,#f7f8fa,#eef2f7)', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '22px', marginBottom: '18px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '10px', marginBottom: '14px' }}>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px' }}>Payoff progress</div>
          <div style={{ fontSize: '12px', color: '#6b7280' }}>Started {loan.startLabel} · est. payoff {loan.payoffLabel}</div>
        </div>
        <div style={{ height: '12px', background: '#f5f6f8', borderRadius: '7px', overflow: 'hidden', marginBottom: '12px' }}>
          <div style={{ height: '100%', borderRadius: '7px', background: 'linear-gradient(90deg,#34d399,#0ea5e9)', width: loan.paidPct + '%' }}></div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', flexWrap: 'wrap', gap: '8px' }}>
          <span style={{ color: '#059669', fontWeight: 600 }}>{loan.paidSoFarLabel} paid ({loan.paidPctLabel}%)</span>
          <span style={{ color: '#6b7280' }}>{loan.balanceLabel} remaining</span>
          <span style={{ color: '#6b7280' }}>Next: {loan.nextPaymentLabel}</span>
        </div>
      </div>

      <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', overflow: 'hidden' }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid #eef0f3', fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px' }}>Amortization schedule</div>
        {loan.years.map(yr => (
          <div key={yr.year} style={{ borderBottom: '1px solid #eef0f3' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', cursor: 'pointer' }} onClick={yr.toggle}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <span style={{ fontSize: '13px', color: '#6b7280', transform: yr.arrowRotate, transition: 'transform 0.15s', display: 'inline-block' }}>▶</span>
                <span style={{ fontWeight: 600, fontSize: '14px' }}>{yr.year}</span>
                <span style={{ fontSize: '12px', color: '#8a90a0' }}>{yr.countLabel}</span>
              </div>
              <div style={{ display: 'flex', gap: '20px', fontSize: '12px', color: '#6b7280' }}>
                <span>Principal {yr.principalLabel}</span>
                <span>Interest {yr.interestLabel}</span>
              </div>
            </div>
            {yr.expanded && (
              <div style={{ maxHeight: '340px', overflowY: 'auto', padding: '0 20px 12px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: '0.7fr 1fr 1fr 1fr 1fr', gap: '8px', fontSize: '11px', color: '#8a90a0', fontWeight: 600, padding: '8px 0', position: 'sticky', top: 0, background: '#ffffff' }}>
                  <span>#</span><span>Date</span><span>Principal</span><span>Interest</span><span>Balance</span>
                </div>
                {yr.rows.map(r => (
                  <div key={r.n} style={{ display: 'grid', gridTemplateColumns: '0.7fr 1fr 1fr 1fr 1fr', gap: '8px', fontSize: '12.5px', padding: '6px 0', color: '#3a3f4b' }}>
                    <span style={{ color: '#8a90a0' }}>{r.n}</span><span>{r.dateLabel}</span><span>{r.principalLabel}</span><span>{r.interestLabel}</span><span>{r.balanceLabel}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function TaxTab({ p, tax, taxViewBtn }) {
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '12px', marginBottom: '18px' }}>
        <div style={{ fontSize: '13px', color: '#6b7280' }}>{tax.yearLabel} · income tax + CPP/QPP estimate</div>
        <div style={{ display: 'flex', background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '10px', padding: '3px' }}>
          <button style={taxViewBtn('ytd')} onClick={() => p.setTaxView('ytd')}>Year-to-date</button>
          <button style={taxViewBtn('projected')} onClick={() => p.setTaxView('projected')}>Projected full year</button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(220px,1fr))', gap: '14px', marginBottom: '18px' }}>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '20px' }}>
          <div style={{ fontSize: '12px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Net self-employment income</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '26px', fontWeight: 700, marginTop: '8px' }}>{tax.netIncomeLabel}</div>
          <div style={{ fontSize: '12px', color: '#8a90a0', marginTop: '6px' }}>income minus deductible expenses</div>
        </div>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '20px' }}>
          <div style={{ fontSize: '12px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Estimated tax owed</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '26px', fontWeight: 700, marginTop: '8px', color: '#dc6547' }}>{tax.totalTaxLabel}</div>
          <div style={{ fontSize: '12px', color: '#8a90a0', marginTop: '6px' }}>CRA + Revenu Québec + CPP/QPP</div>
        </div>
        <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '20px' }}>
          <div style={{ fontSize: '12px', color: '#6b7280', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Suggested weekly set-aside</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: '26px', fontWeight: 700, marginTop: '8px', color: '#059669' }}>{tax.weeklySetAsideLabel}</div>
          <div style={{ fontSize: '12px', color: '#8a90a0', marginTop: '6px' }}>{tax.effectiveRateLabel} effective rate</div>
        </div>
      </div>

      <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '22px', marginBottom: '18px' }}>
        <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px', marginBottom: '16px' }}>What you owe, by agency</div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid #eef0f3' }}>
          <div><div style={{ fontSize: '14px', fontWeight: 600 }}>CRA — federal income tax</div><div style={{ fontSize: '12px', color: '#8a90a0' }}>after 16.5% Québec abatement</div></div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: '16px' }}>{tax.federalLabel}</div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid #eef0f3' }}>
          <div><div style={{ fontSize: '14px', fontWeight: 600 }}>Revenu Québec — provincial income tax</div><div style={{ fontSize: '12px', color: '#8a90a0' }}>filed separately from your federal return</div></div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: '16px' }}>{tax.quebecLabel}</div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid #eef0f3' }}>
          <div><div style={{ fontSize: '14px', fontWeight: 600 }}>QPP — self-employed contribution</div><div style={{ fontSize: '12px', color: '#8a90a0' }}>you pay both the employee and employer share</div></div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: '16px' }}>{tax.qppLabel}</div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0 0' }}>
          <div style={{ fontSize: '14px', fontWeight: 700 }}>Total estimated tax</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: '18px', color: '#dc6547' }}>{tax.totalTaxLabel}</div>
        </div>
      </div>

      <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '22px', marginBottom: '18px' }}>
        <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px', marginBottom: '4px' }}>GST/QST on rideshare fares</div>
        <div style={{ fontSize: '12px', color: '#8a90a0', marginBottom: '14px' }}>Uber + Lyft income, year-to-date — sales tax is included in your fares and must be remitted</div>
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b', borderBottom: '1px solid #eef0f3' }}><span>Rideshare gross fares</span><span style={{ fontWeight: 600 }}>{tax.gst.grossLabel}</span></div>
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b', borderBottom: '1px solid #eef0f3' }}><span>GST to remit (5%)</span><span style={{ fontWeight: 600 }}>{tax.gst.gstLabel}</span></div>
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b', borderBottom: '1px solid #eef0f3' }}><span>QST to remit (9.975%)</span><span style={{ fontWeight: 600 }}>{tax.gst.qstLabel}</span></div>
        {tax.gst.hasStatements && (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b', borderBottom: '1px solid #eef0f3' }}><span>GST/QST collected (statements)</span><span style={{ fontWeight: 600 }}>{tax.gst.stCollectedLabel}</span></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b', borderBottom: '1px solid #eef0f3' }}><span>Already remitted by platform</span><span style={{ fontWeight: 600, color: '#059669' }}>{tax.gst.stRemittedLabel}</span></div>
          </div>
        )}
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0 0', fontSize: '13px', fontWeight: 700 }}><span>Total to remit</span><span style={{ color: '#dc6547' }}>{tax.gst.totalLabel}</span></div>
        <div style={{ fontSize: '11.5px', color: '#8a90a0', marginTop: '10px' }}>Rideshare drivers must register for GST/QST from the first dollar. Delivery-only income (Skip, DoorDash, Instacart) is exempt below $30,000/year. Input tax credits on expenses can reduce what you remit.</div>
      </div>

      <div style={{ background: '#ffffff', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '22px', marginBottom: '18px' }}>
        <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: '15px', marginBottom: '14px' }}>Deductible business expenses counted</div>
        {tax.deductions.map((d, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', fontSize: '13px', color: '#3a3f4b' }}><span>{d.name}</span><span style={{ fontWeight: 600 }}>{d.amountLabel}</span></div>
        ))}
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0 0', marginTop: '6px', borderTop: '1px solid #eef0f3', fontSize: '13px', fontWeight: 700 }}><span>Total deductions</span><span>{tax.totalDeductionsLabel}</span></div>
        <div style={{ fontSize: '11.5px', color: '#8a90a0', marginTop: '10px' }}>Only the interest portion of your car loan payment is deductible — not the principal.</div>
      </div>

      <div style={{ background: '#f7f8fa', border: '1px solid #e6e8ec', borderRadius: '16px', padding: '18px 20px', fontSize: '12.5px', color: '#6b7280', lineHeight: 1.6 }}>
        Estimates use approximate 2026 federal and Québec tax brackets, the federal/Québec basic personal amounts, and self-employed QPP rates — actual amounts depend on your full tax return, credits, and other income. Ride-share drivers (Uber, Lyft) must also register for and collect GST/QST from their first dollar of fares, separate from income tax — check Revenu Québec's rules for platform drivers. Consult a tax professional for exact figures.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
  // Manually transform the JSX source with the classic runtime (React.createElement),
  // since the automatic runtime would emit `import` statements babel-standalone's
  // autorun can't execute in a plain (non-module) inline script.
  var source = document.getElementById('app-source').textContent;
  var output = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
  var script = document.createElement('script');
  script.textContent = output;
  document.body.appendChild(script);
</script>
