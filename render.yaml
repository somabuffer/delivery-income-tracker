services:
  - type: web
    name: delivery-income-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ALLOWED_EMAIL
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
